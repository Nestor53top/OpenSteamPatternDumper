name: Steam Pattern Dumper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  dump-patterns:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pefile requests

      - name: Install Steam
        run: |
          $installDir = "C:\Steam"
          New-Item -ItemType Directory -Force -Path $installDir
          Start-Process -FilePath ".\SteamSetup.exe" -ArgumentList "/S" -Wait -NoNewWindow
          Start-Sleep -Seconds 30
          
          $steamPaths = @(
            "C:\Program Files (x86)\Steam",
            "C:\Program Files\Steam",
            "C:\Steam",
            "$env:LOCALAPPDATA\Steam"
          )
          
          $steamPath = $null
          foreach ($path in $steamPaths) {
            if (Test-Path "$path\steam.exe") {
              $steamPath = $path
              break
            }
          }
          
          if (-not $steamPath) {
            $steamPath = Get-ChildItem -Path "C:\" -Filter "steam.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty DirectoryName
          }
          
          if ($steamPath) {
            echo "STEAM_PATH=$steamPath" | Out-File -FilePath $env:GITHUB_ENV -Append
            Write-Host "Steam found at: $steamPath"
          } else {
            echo "STEAM_PATH=C:\Program Files (x86)\Steam" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Wait for Steam
        run: |
          Start-Sleep -Seconds 15
          $steamPath = $env:STEAM_PATH
          if (Test-Path "$steamPath\steamclient64.dll") {
            Write-Host "steamclient64.dll found"
          } else {
            Write-Host "steamclient64.dll not found"
            Get-ChildItem -Path $steamPath -ErrorAction SilentlyContinue | Select-Object Name
          }

      - name: Extract DLLs
        run: |
          $steamPath = $env:STEAM_PATH
          $outputDir = "output"
          New-Item -ItemType Directory -Force -Path $outputDir
          
          $dlls = @("steamclient64.dll", "steamui.dll")
          foreach ($dll in $dlls) {
            $src = Join-Path $steamPath $dll
            $dst = Join-Path $outputDir $dll
            if (Test-Path $src) {
              Copy-Item -Path $src -Destination $dst -Force
              $hash = (Get-FileHash -Path $dst -Algorithm SHA256).Hash.ToLower()
              Write-Host "$dll SHA-256: $hash"
              echo "${dll}_HASH=$hash" | Out-File -FilePath $env:GITHUB_ENV -Append
            } else {
              Write-Host "WARNING: $dll not found"
            }
          }

      - name: Download patterns from steam-monitor
        run: |
          $outputDir = "output"
          New-Item -ItemType Directory -Force -Path "$outputDir\patterns"
          
          $steamclientHash = $env:steamclient64.dll_HASH
          $steamuiHash = $env:steamui.dll_HASH
          
          $baseUri = "https://raw.githubusercontent.com/OpenSteam001/steam-monitor/pattern"
          
          # Check steamclient
          if ($steamclientHash) {
            $url = "$baseUri/steamclient/$steamclientHash.toml"
            $outFile = "$outputDir\patterns\steamclient_$steamclientHash.toml"
            try {
              Invoke-WebRequest -Uri $url -OutFile $outFile -TimeoutSec 10 -ErrorAction Stop
              Write-Host "SUCCESS: Found steamclient pattern"
            } catch {
              Write-Host "Pattern not found for steamclient"
              @"
# steamclient64.dll pattern
# SHA-256: $steamclientHash
# Not yet in steam-monitor - manual extraction needed
"@ | Out-File $outFile -Encoding UTF8
            }
          }
          
          # Check steamui
          if ($steamuiHash) {
            $url = "$baseUri/steamui/$steamuiHash.toml"
            $outFile = "$outputDir\patterns\steamui_$steamuiHash.toml"
            try {
              Invoke-WebRequest -Uri $url -OutFile $outFile -TimeoutSec 10 -ErrorAction Stop
              Write-Host "SUCCESS: Found steamui pattern"
            } catch {
              Write-Host "Pattern not found for steamui"
              @"
# steamui.dll pattern
# SHA-256: $steamuiHash
# Not yet in steam-monitor - manual extraction needed
"@ | Out-File $outFile -Encoding UTF8
            }
          }
          
          # Save info
          $steamPath = $env:STEAM_PATH
          $steamExe = Join-Path $steamPath "steam.exe"
          $version = "unknown"
          if (Test-Path $steamExe) {
            $version = (Get-Item $steamExe).VersionInfo.FileVersion
          }
          
          @{
            steam_version = $version
            steamclient_hash = $steamclientHash
            steamui_hash = $steamuiHash
            timestamp = (Get-Date -Format "yyyy-MM-dd HH:mm:ss")
          } | ConvertTo-Json | Out-File "$outputDir\patterns\steam_info.json"

      - name: Create archive
        run: |
          $outputDir = "output\patterns"
          $archiveName = "steam-patterns-$(Get-Date -Format 'yyyyMMdd-HHmmss')"
          Compress-Archive -Path "$outputDir\*" -DestinationPath "$archiveName.zip" -Force
          Write-Host "Created: $archiveName.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: steam-patterns-${{ github.run_number }}
          path: output/patterns/*
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          if (Test-Path "output\patterns\steam_info.json") {
            $info = Get-Content "output\patterns\steam_info.json" | ConvertFrom-Json
            Write-Host "Steam: $($info.steam_version)"
            Write-Host "steamclient64.dll: $($info.steamclient_hash)"
            Write-Host "steamui.dll: $($info.steamui_hash)"
          }
          Get-ChildItem "output\patterns" -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "  $($_.Name) ($([math]::Round($_.Length / 1KB, 2)) KB)"
          }
