name: Steam Pattern Dumper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  dump-patterns:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pefile requests

      - name: Install and run Steam to download files
        run: |
          $installDir = "C:\Steam"
          New-Item -ItemType Directory -Force -Path $installDir
          
          Write-Host "=== Installing Steam ==="
          Start-Process -FilePath ".\SteamSetup.exe" -ArgumentList "/S" -Wait -NoNewWindow
          Start-Sleep -Seconds 10
          
          # Find Steam installation
          $steamPath = $null
          $possiblePaths = @(
            "C:\Program Files (x86)\Steam",
            "C:\Program Files\Steam",
            "C:\Steam",
            "$env:LOCALAPPDATA\Steam",
            "$env:PROGRAMFILES\Steam",
            "$env:PROGRAMFILES(X86)\Steam"
          )
          
          foreach ($path in $possiblePaths) {
            if (Test-Path "$path\steam.exe") {
              $steamPath = $path
              break
            }
          }
          
          if (-not $steamPath) {
            $steamPath = Get-ChildItem -Path "C:\" -Filter "steam.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty DirectoryName
          }
          
          if (-not $steamPath) {
            $steamPath = "C:\Program Files (x86)\Steam"
          }
          
          echo "STEAM_PATH=$steamPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Steam path: $steamPath"
          
          # Run Steam.exe to download client files
          $steamExe = Join-Path $steamPath "steam.exe"
          if (Test-Path $steamExe) {
            Write-Host "=== Running Steam to download client files ==="
            
            # Start Steam with various flags to force download
            Start-Process -FilePath $steamExe -ArgumentList "-no-browser -nochatui -silent" -ErrorAction SilentlyContinue
            
            # Wait for DLLs to appear (check every 5 seconds for 2 minutes)
            $maxWait = 120
            $elapsed = 0
            $dllsFound = @()
            
            while ($elapsed -lt $maxWait) {
              Start-Sleep -Seconds 5
              $elapsed += 5
              
              # Check for DLLs
              $targetDlls = @("steamclient64.dll", "steamui.dll")
              foreach ($dll in $targetDlls) {
                $dllPath = Join-Path $steamPath $dll
                if (Test-Path $dllPath) {
                  $size = (Get-Item $dllPath).Length
                  if ($size -gt 1000000) {  # At least 1MB
                    Write-Host "  FOUND: $dll ($([math]::Round($size/1MB, 2)) MB)"
                    $dllsFound += $dll
                  }
                }
              }
              
              if ($dllsFound.Count -ge 2) {
                Write-Host "All DLLs found!"
                break
              }
              
              Write-Host "  Waiting... ($elapsed/$maxWait sec) - Found: $($dllsFound.Count)/2"
            }
            
            # Kill Steam
            Write-Host "=== Killing Steam ==="
            Get-Process -Name "steam" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            Get-Process -Name "steamwebhelper" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            Get-Process -Name "steam_oOo..." -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 3
            
            # Final check
            Write-Host "=== Final DLL check ==="
            Get-ChildItem -Path $steamPath -Filter "*.dll" | ForEach-Object {
              Write-Host "  $($_.Name) - $([math]::Round($_.Length/1KB, 2)) KB"
            }
          }

      - name: Extract DLLs
        run: |
          $steamPath = $env:STEAM_PATH
          $outputDir = "output"
          New-Item -ItemType Directory -Force -Path $outputDir
          
          $dlls = @("steamclient64.dll", "steamui.dll")
          foreach ($dll in $dlls) {
            $src = Join-Path $steamPath $dll
            $dst = Join-Path $outputDir $dll
            if (Test-Path $src) {
              Copy-Item -Path $src -Destination $dst -Force
              $hash = (Get-FileHash -Path $dst -Algorithm SHA256).Hash.ToLower()
              Write-Host "$dll SHA-256: $hash"
              echo "HASH_$($dll.Replace('.dll','').Replace('64',''))=$hash" | Out-File -FilePath $env:GITHUB_ENV -Append
            } else {
              Write-Host "$dll NOT FOUND"
            }
          }

      - name: Download patterns from steam-monitor
        run: |
          $outputDir = "output"
          New-Item -ItemType Directory -Force -Path "$outputDir\patterns"
          
          $steamclientHash = $env:HASH_steamclient
          $steamuiHash = $env:HASH_steamui
          
          Write-Host "steamclient hash: $steamclientHash"
          Write-Host "steamui hash: $steamuiHash"
          
          $baseUri = "https://raw.githubusercontent.com/OpenSteam001/steam-monitor/pattern"
          
          if ($steamclientHash) {
            $url = "$baseUri/steamclient/$steamclientHash.toml"
            $outFile = "$outputDir\patterns\steamclient_$steamclientHash.toml"
            try {
              Invoke-WebRequest -Uri $url -OutFile $outFile -TimeoutSec 10 -ErrorAction Stop
              Write-Host "SUCCESS: Found steamclient pattern"
            } catch {
              Write-Host "Pattern not found for steamclient"
              Set-Content -Path $outFile -Value "# SHA-256: $steamclientHash - not in steam-monitor"
            }
          }
          
          if ($steamuiHash) {
            $url = "$baseUri/steamui/$steamuiHash.toml"
            $outFile = "$outputDir\patterns\steamui_$steamuiHash.toml"
            try {
              Invoke-WebRequest -Uri $url -OutFile $outFile -TimeoutSec 10 -ErrorAction Stop
              Write-Host "SUCCESS: Found steamui pattern"
            } catch {
              Write-Host "Pattern not found for steamui"
              Set-Content -Path $outFile -Value "# SHA-256: $steamuiHash - not in steam-monitor"
            }
          }
          
          # Save info
          $steamPath = $env:STEAM_PATH
          $version = "unknown"
          $steamExe = Join-Path $steamPath "steam.exe"
          if (Test-Path $steamExe) {
            $version = (Get-Item $steamExe).VersionInfo.FileVersion
          }
          
          @{
            steam_version = $version
            steamclient_hash = $steamclientHash
            steamui_hash = $steamuiHash
            timestamp = (Get-Date -Format "yyyy-MM-dd HH:mm:ss")
          } | ConvertTo-Json | Out-File "$outputDir\steam_info.json"

      - name: Scan DLLs for patterns
        run: |
          $outputDir = "output"
          $dllDir = $outputDir
          
          Write-Host "=== Running pattern scanner ==="
          
          # Scan steamclient64.dll
          $clientDll = Join-Path $dllDir "steamclient64.dll"
          if (Test-Path $clientDll) {
            Write-Host "Scanning steamclient64.dll..."
            python tools/sig_scanner.py $clientDll $outputDir\steamclient64.toml
          }
          
          # Scan steamui.dll
          $uiDll = Join-Path $dllDir "steamui.dll"
          if (Test-Path $uiDll) {
            Write-Host "Scanning steamui.dll..."
            python tools/sig_scanner.py $uiDll $outputDir\steamui.toml
          }
          
          # Extract IPC vtables
          Write-Host "=== Running IPC extractor ==="
          python tools/ipc_extractor.py $dllDir\steamclient64.dll $outputDir\ipc_vtables.toml

      - name: Create archive
        run: |
          $outputDir = "output"
          if (Test-Path $outputDir) {
            $archiveName = "steam-patterns-$(Get-Date -Format 'yyyyMMdd-HHmmss')"
            Compress-Archive -Path "$outputDir\*" -DestinationPath "$archiveName.zip" -Force
            Write-Host "Created: $archiveName.zip"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: steam-patterns-${{ github.run_number }}
          path: output/*
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          Write-Host "`n=== SUMMARY ==="
          if (Test-Path "output\steam_info.json") {
            $info = Get-Content "output\steam_info.json" | ConvertFrom-Json
            Write-Host "Steam: $($info.steam_version)"
            Write-Host "steamclient: $($info.steamclient_hash)"
            Write-Host "steamui: $($info.steamui_hash)"
          }
          Get-ChildItem "output" -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "  $($_.Name) ($([math]::Round($_.Length / 1KB, 2)) KB)"
          }
