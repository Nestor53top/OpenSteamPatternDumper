name: Steam Pattern Dumper

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  dump-patterns:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pefile requests

      - name: Download ALL data from steam-monitor (pattern + ipc + protobuf)
        run: |
          python tools/download_patterns.py --output-dir steam_monitor_data --token ${{ secrets.GITHUB_TOKEN }}

      - name: Merge reference patterns
        run: |
          python tools/merge_patterns.py --patterns-dir steam_monitor_data/pattern --output output/merged_reference.json

      - name: Install and run Steam to download files
        run: |
          $installDir = "C:\Steam"
          New-Item -ItemType Directory -Force -Path $installDir
          
          Write-Host "=== Installing Steam ==="
          Start-Process -FilePath ".\SteamSetup.exe" -ArgumentList "/S" -Wait -NoNewWindow
          Start-Sleep -Seconds 10
          
          $steamPath = $null
          $possiblePaths = @(
            "C:\Program Files (x86)\Steam",
            "C:\Program Files\Steam",
            "C:\Steam",
            "$env:LOCALAPPDATA\Steam",
            "$env:PROGRAMFILES\Steam",
            "$env:PROGRAMFILES(X86)\Steam"
          )
          
          foreach ($path in $possiblePaths) {
            if (Test-Path "$path\steam.exe") {
              $steamPath = $path
              break
            }
          }
          
          if (-not $steamPath) {
            $steamPath = Get-ChildItem -Path "C:\" -Filter "steam.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty DirectoryName
          }
          
          if (-not $steamPath) {
            $steamPath = "C:\Program Files (x86)\Steam"
          }
          
          echo "STEAM_PATH=$steamPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Steam path: $steamPath"
          
          $steamExe = Join-Path $steamPath "steam.exe"
          if (Test-Path $steamExe) {
            Write-Host "=== Running Steam ==="
            Start-Process -FilePath $steamExe -ArgumentList "-no-browser -nochatui -silent" -ErrorAction SilentlyContinue
            
            $maxWait = 120
            $elapsed = 0
            $dllsFound = @()
            
            while ($elapsed -lt $maxWait) {
              Start-Sleep -Seconds 5
              $elapsed += 5
              
              foreach ($dll in @("steamclient64.dll", "steamui.dll")) {
                $dllPath = Join-Path $steamPath $dll
                if (Test-Path $dllPath) {
                  $size = (Get-Item $dllPath).Length
                  if ($size -gt 1000000) {
                    Write-Host "  FOUND: $dll ($([math]::Round($size/1MB, 2)) MB)"
                    $dllsFound += $dll
                  }
                }
              }
              
              if ($dllsFound.Count -ge 2) {
                Write-Host "All DLLs found!"
                break
              }
              Write-Host "  Waiting... ($elapsed/$maxWait sec)"
            }
            
            Get-Process -Name "steam" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            Get-Process -Name "steamwebhelper" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 3
          }

      - name: Extract DLLs and compute hashes
        run: |
          $steamPath = $env:STEAM_PATH
          $outputDir = "output"
          New-Item -ItemType Directory -Force -Path $outputDir
          
          foreach ($dll in @("steamclient64.dll", "steamui.dll")) {
            $src = Join-Path $steamPath $dll
            $dst = Join-Path $outputDir $dll
            if (Test-Path $src) {
              Copy-Item -Path $src -Destination $dst -Force
              $hash = (Get-FileHash -Path $dst -Algorithm SHA256).Hash.ToLower()
              Write-Host "$dll SHA-256: $hash"
              $envVar = "HASH_" + $dll.Replace(".dll","").Replace("64","")
              echo "$envVar=$hash" | Out-File -FilePath $env:GITHUB_ENV -Append
            }
          }

      - name: Extract ALL exports from DLLs
        run: |
          python tools/extract_exports.py --dll output/steamclient64.dll --component steamclient --output output/exports_steamclient.json
          python tools/extract_exports.py --dll output/steamui.dll --component steamui --output output/exports_steamui.json

      - name: Build comprehensive function list
        run: |
          python tools/build_function_list.py --patterns-dir steam_monitor_data/pattern --exports-dir output --output output/all_functions.json

      - name: Scan steamclient64.dll with ALL functions
        run: |
          python tools/sig_scanner.py --dll output/steamclient64.dll --component steamclient --output output/steamclient64.toml --functions-json output/all_functions.json

      - name: Scan steamui.dll with ALL functions
        run: |
          python tools/sig_scanner.py --dll output/steamui.dll --component steamui --output output/steamui.toml --functions-json output/all_functions.json

      - name: Find MISSING functions via string references
        run: |
          echo "=== Finding patterns for 27 missing steam-monitor functions ==="
          python tools/string_ref_fast.py --dll output/steamclient64.dll --functions-json steam_monitor_data/pattern/steamclient/merged.json --output output/string_ref_patterns.json
          
          echo ""
          echo "=== Results ==="
          python tools/check_string_refs.py

      - name: Merge ALL patterns into final TOML
        run: |
          python tools/merge_all_patterns.py

      - name: Extract IPC vtables (merging steam-monitor IPC data)
        run: |
          python tools/ipc_extractor.py --dll output/steamclient64.dll --output output/ipc_vtables.toml --pattern-toml output/steamclient64_final.toml --steam-monitor-ipc-dir steam_monitor_data/ipc/steamclient

      - name: Copy matching patterns from steam-monitor
        run: |
          $outputDir = "output"
          New-Item -ItemType Directory -Force -Path "$outputDir\patterns_match"
          
          $steamclientHash = $env:HASH_steamclient
          $steamuiHash = $env:HASH_steamui
          
          Write-Host "steamclient hash: $steamclientHash"
          Write-Host "steamui hash: $steamuiHash"
          
          $baseUri = "https://raw.githubusercontent.com/OpenSteam001/steam-monitor/pattern"
          
          foreach ($comp in @("steamclient", "steamui")) {
            $hashVar = "HASH_" + $comp
            $hash = [Environment]::GetEnvironmentVariable($hashVar)
            if ($hash) {
              $url = "$baseUri/$comp/$hash.toml"
              $outFile = "$outputDir\patterns_match\${comp}_${hash}.toml"
              try {
                Invoke-WebRequest -Uri $url -OutFile $outFile -TimeoutSec 15 -ErrorAction Stop
                Write-Host "SUCCESS: Found $comp pattern"
              } catch {
                Write-Host "Pattern not found for $comp (new version)"
                Set-Content -Path $outFile -Value "# SHA-256: $hash - not in steam-monitor"
              }
            }
          }
          
          $steamPath = $env:STEAM_PATH
          $version = "unknown"
          $steamExe = Join-Path $steamPath "steam.exe"
          if (Test-Path $steamExe) {
            $version = (Get-Item $steamExe).VersionInfo.FileVersion
          }
          
          @{
            steam_version = $version
            steamclient_hash = $steamclientHash
            steamui_hash = $steamuiHash
            timestamp = (Get-Date -Format "yyyy-MM-dd HH:mm:ss")
          } | ConvertTo-Json | Out-File "$outputDir\steam_info.json"

      - name: Create final output
        run: |
          $outDir = "output/final"
          New-Item -ItemType Directory -Force -Path $outDir
          New-Item -ItemType Directory -Force -Path "$outDir/steamclient"
          New-Item -ItemType Directory -Force -Path "$outDir/steamui"
          New-Item -ItemType Directory -Force -Path "$outDir/ipc"
          New-Item -ItemType Directory -Force -Path "$outDir/protobuf/steamclient"
          New-Item -ItemType Directory -Force -Path "$outDir/protobuf/steamui"
          
          Copy-Item "output/steam_info.json" "$outDir/"
          Copy-Item "output/all_functions.json" "$outDir/"
          Copy-Item "output/merged_reference.json" "$outDir/"
          Copy-Item "output/steamclient64_final.toml" "$outDir/steamclient/steamclient64.toml"
          Copy-Item "output/exports_steamclient.json" "$outDir/steamclient/"
          Copy-Item "output/string_ref_patterns.json" "$outDir/steamclient/"
          Copy-Item "output/steamui.toml" "$outDir/steamui/"
          Copy-Item "output/exports_steamui.json" "$outDir/steamui/"
          Copy-Item "output/ipc_vtables.toml" "$outDir/ipc/"
          
          if (Test-Path "steam_monitor_data/protobuf/steamclient") {
            Copy-Item "steam_monitor_data/protobuf/steamclient/*.proto" "$outDir/protobuf/steamclient/" -ErrorAction SilentlyContinue
          }
          if (Test-Path "steam_monitor_data/protobuf/steamui") {
            Copy-Item "steam_monitor_data/protobuf/steamui/*.proto" "$outDir/protobuf/steamui/" -ErrorAction SilentlyContinue
          }
          
          $timestamp = Get-Date -Format 'yyyyMMdd-HHmmss'
          Compress-Archive -Path "output/final/*" -DestinationPath "steam-patterns-$timestamp.zip" -Force
          Write-Host "Created: steam-patterns-$timestamp.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: steam-patterns-${{ github.run_number }}
          path: |
            output/steamclient64_final.toml
            output/string_ref_patterns.json
            output/steamui.toml
            output/ipc_vtables.toml
            output/exports_steamclient.json
            output/exports_steamui.json
            output/all_functions.json
            output/steam_info.json
            output/merged_reference.json
            output/patterns_match/
            output/final/
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          Write-Host "`n=== FINAL SUMMARY ==="
          if (Test-Path "output/steam_info.json") {
            $info = Get-Content "output/steam_info.json" | ConvertFrom-Json
            Write-Host "Steam: $($info.steam_version)"
            Write-Host "steamclient hash: $($info.steamclient_hash)"
            Write-Host "steamui hash: $($info.steamui_hash)"
          }
          
          if (Test-Path "output/exports_steamclient.json") {
            $ec = (Get-Content "output/exports_steamclient.json" | ConvertFrom-Json).Count
            Write-Host "`nsteamclient64.dll exports: $ec"
          }
          if (Test-Path "output/exports_steamui.json") {
            $eu = (Get-Content "output/exports_steamui.json" | ConvertFrom-Json).Count
            Write-Host "steamui.dll exports: $eu"
          }
          
          if (Test-Path "output/steamclient64.toml") {
            $sc = (Get-Content "output/steamclient64.toml" | Select-String "^\[" | Measure-Object).Count
            Write-Host "`nsteamclient64 patterns: $sc"
          }
          if (Test-Path "output/steamui.toml") {
            $su = (Get-Content "output/steamui.toml" | Select-String "^\[" | Measure-Object).Count
            Write-Host "steamui patterns: $su"
          }
          if (Test-Path "output/ipc_vtables.toml") {
            $ipc = (Get-Content "output/ipc_vtables.toml" | Select-String "^\[" | Measure-Object).Count
            Write-Host "IPC interfaces/methods: $ipc"
          }
          
          $protoCount = 0
          if (Test-Path "output/final/protobuf/steamclient") {
            $protoCount = (Get-ChildItem "output/final/protobuf/steamclient/*.proto" -ErrorAction SilentlyContinue).Count
          }
          Write-Host "Protobuf definitions: $protoCount"
          
          Write-Host "`nAll output files:"
          Get-ChildItem "output" -Recurse -File | ForEach-Object {
            $rel = $_.FullName.Replace((Get-Location).Path + "\output\", "")
            Write-Host "  $rel ($([math]::Round($_.Length / 1KB, 2)) KB)"
          }
