name: Steam Pattern Dumper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  dump-patterns:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pefile requests

      - name: Install Steam
        run: |
          $installDir = "C:\Steam"
          New-Item -ItemType Directory -Force -Path $installDir
          Start-Process -FilePath ".\SteamSetup.exe" -ArgumentList "/S" -Wait -NoNewWindow
          Start-Sleep -Seconds 10
          
          $steamPaths = @(
            "C:\Program Files (x86)\Steam",
            "C:\Program Files\Steam",
            "C:\Steam",
            "$env:LOCALAPPDATA\Steam",
            "$env:PROGRAMFILES\Steam",
            "$env:PROGRAMFILES(X86)\Steam"
          )
          
          $steamPath = $null
          foreach ($path in $steamPaths) {
            if (Test-Path "$path\steam.exe") {
              $steamPath = $path
              break
            }
          }
          
          if (-not $steamPath) {
            $steamPath = Get-ChildItem -Path "C:\" -Filter "steam.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty DirectoryName
          }
          
          if ($steamPath) {
            echo "STEAM_PATH=$steamPath" | Out-File -FilePath $env:GITHUB_ENV -Append
            Write-Host "Steam found at: $steamPath"
          } else {
            echo "STEAM_PATH=C:\Program Files (x86)\Steam" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Launch and kill Steam to generate DLLs
        run: |
          $steamPath = $env:STEAM_PATH
          $steamExe = Join-Path $steamPath "steam.exe"
          
          if (Test-Path $steamExe) {
            Write-Host "Launching Steam briefly..."
            Start-Process -FilePath $steamExe -ArgumentList "-silent" -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 5
            
            Write-Host "Killing Steam..."
            Get-Process -Name "steam" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            Get-Process -Name "steamwebhelper" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 3
          }

      - name: Search for DLLs everywhere
        run: |
          $searchPaths = @(
            "C:\Program Files (x86)\Steam",
            "C:\Program Files\Steam",
            "C:\Steam",
            "$env:LOCALAPPDATA\Steam",
            "$env:APPDATA\Steam",
            "C:\"
          )
          
          $dlls = @("steamclient64.dll", "steamui.dll", "steamclient.dll")
          $found = @{}
          
          foreach ($searchPath in $searchPaths) {
            if (Test-Path $searchPath) {
              Write-Host "Searching in: $searchPath"
              foreach ($dll in $dlls) {
                $found = Get-ChildItem -Path $searchPath -Filter $dll -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
                if ($found) {
                  Write-Host "  FOUND: $($found.FullName)"
                  echo "DLL_$($dll.Replace('.dll',''))=$($found.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
                }
              }
            }
          }
          
          # Also try finding steam.exe location
          $steamExes = Get-ChildItem -Path "C:\" -Filter "steam.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 3
          foreach ($exe in $steamExes) {
            Write-Host "Found steam.exe at: $($exe.DirectoryName)"
            $parentDir = $exe.DirectoryName
            foreach ($dll in $dlls) {
              $dllPath = Join-Path $parentDir $dll
              if (Test-Path $dllPath) {
                Write-Host "  FOUND DLL: $dllPath"
                echo "DLL_$($dll.Replace('.dll',''))=$dllPath" | Out-File -FilePath $env:GITHUB_ENV -Append
              }
            }
          }

      - name: Extract DLLs
        run: |
          $outputDir = "output"
          New-Item -ItemType Directory -Force -Path $outputDir
          
          $dllEnvVars = @("DLL_steamclient64", "DLL_steamui", "DLL_steamclient")
          $dllNames = @("steamclient64.dll", "steamui.dll", "steamclient.dll")
          
          for ($i = 0; $i -lt $dllEnvVars.Count; $i++) {
            $envVar = $dllEnvVars[$i]
            $dllName = $dllNames[$i]
            $dllPath = [Environment]::GetEnvironmentVariable($envVar)
            
            if ($dllPath -and (Test-Path $dllPath)) {
              $dst = Join-Path $outputDir $dllName
              Copy-Item -Path $dllPath -Destination $dst -Force
              $hash = (Get-FileHash -Path $dst -Algorithm SHA256).Hash.ToLower()
              Write-Host "$dllName SHA-256: $hash (from $dllPath)"
              echo "HASH_$($dllName.Replace('.dll',''))=$hash" | Out-File -FilePath $env:GITHUB_ENV -Append
            } else {
              Write-Host "$dllName not found via env"
            }
          }
          
          # Fallback: search in output dir
          Get-ChildItem $outputDir -Filter "*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "DLL in output: $($_.FullName)"
          }

      - name: Download patterns from steam-monitor
        run: |
          $outputDir = "output"
          New-Item -ItemType Directory -Force -Path "$outputDir\patterns"
          
          $steamclientHash = $env:HASH_steamclient64
          $steamuiHash = $env:HASH_steamui
          
          $baseUri = "https://raw.githubusercontent.com/OpenSteam001/steam-monitor/pattern"
          
          if ($steamclientHash) {
            $url = "$baseUri/steamclient/$steamclientHash.toml"
            $outFile = "$outputDir\patterns\steamclient_$steamclientHash.toml"
            try {
              Invoke-WebRequest -Uri $url -OutFile $outFile -TimeoutSec 10 -ErrorAction Stop
              Write-Host "SUCCESS: Found steamclient pattern"
            } catch {
              Write-Host "Pattern not found for steamclient ($steamclientHash)"
              Set-Content -Path $outFile -Value "# SHA-256: $steamclientHash - not in steam-monitor"
            }
          } else {
            Write-Host "No steamclient hash available"
          }
          
          if ($steamuiHash) {
            $url = "$baseUri/steamui/$steamuiHash.toml"
            $outFile = "$outputDir\patterns\steamui_$steamuiHash.toml"
            try {
              Invoke-WebRequest -Uri $url -OutFile $outFile -TimeoutSec 10 -ErrorAction Stop
              Write-Host "SUCCESS: Found steamui pattern"
            } catch {
              Write-Host "Pattern not found for steamui ($steamuiHash)"
              Set-Content -Path $outFile -Value "# SHA-256: $steamuiHash - not in steam-monitor"
            }
          } else {
            Write-Host "No steamui hash available"
          }
          
          $steamPath = $env:STEAM_PATH
          $steamExe = Join-Path $steamPath "steam.exe"
          $version = "unknown"
          if (Test-Path $steamExe) {
            $version = (Get-Item $steamExe).VersionInfo.FileVersion
          }
          
          $info = @{
            steam_version = $version
            steamclient_hash = $steamclientHash
            steamui_hash = $steamuiHash
            timestamp = (Get-Date -Format "yyyy-MM-dd HH:mm:ss")
          }
          $info | ConvertTo-Json | Out-File "$outputDir\patterns\steam_info.json"

      - name: Create archive
        run: |
          $outputDir = "output\patterns"
          if (Test-Path $outputDir) {
            $archiveName = "steam-patterns-$(Get-Date -Format 'yyyyMMdd-HHmmss')"
            Compress-Archive -Path "$outputDir\*" -DestinationPath "$archiveName.zip" -Force
            Write-Host "Created: $archiveName.zip"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: steam-patterns-${{ github.run_number }}
          path: output/patterns/*
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          Write-Host "`n=== SUMMARY ==="
          if (Test-Path "output\patterns\steam_info.json") {
            $info = Get-Content "output\patterns\steam_info.json" | ConvertFrom-Json
            Write-Host "Steam: $($info.steam_version)"
            Write-Host "steamclient: $($info.steamclient_hash)"
            Write-Host "steamui: $($info.steamui_hash)"
          }
          Get-ChildItem "output\patterns" -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "  $($_.Name) ($([math]::Round($_.Length / 1KB, 2)) KB)"
          }
